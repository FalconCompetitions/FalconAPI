services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: falcon_database
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=${MSSQL_SA_PASSWORD}
    ports:
      # Standard SQL Server TCP port
      - "1433:1433"
    volumes:
      # Official internal path where SQL Server persists data, logs, and secrets
      - db_data:/var/opt/mssql
    healthcheck:
      # Using mssql-tools18. The -No flag is crucial here to trust the container's self-signed TLS certificate
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "${MSSQL_SA_PASSWORD}", "-No", "-Q", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    container_name: falcon_api
    build:
        context: .
        dockerfile: /Dockerfile
    ports:
    - "443:443"
    - "7163:8080"
    environment:
    - ASPNETCORE_ENVIRONMENT=Development
    - ConnectionStrings__DefaultConnection=server=db;user=sa;password=${MSSQL_SA_PASSWORD};database=falcondb;TrustServerCertificate=True
    
    depends_on:
      db:
        condition: service_healthy
    env_file: .env.development
volumes:
  db_data:
